version: "2"
sql:
  - schema: "internal/sql/schema"
    queries: "internal/sql/queries"
    engine: "sqlite"
    gen:
      go:
        out: "internal/database"
        overrides:
          - column: "*.id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "*.user_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          - column: "*.created_at"
            go_type: "time.Time"
          - column: "*.updated_at"
            go_type: "time.Time"
          - column: "*.expires_at"
            go_type: "time.Time"
          - column: "*.revoked_at"
            go_type: "time.Time"
